# Publish @ultradyn/hark when a tag v* is pushed (OIDC trusted publishing preferred).
# First publish may need npm access setup for the ultradyn org + trusted publisher.
name: Publish @ultradyn/hark

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ultradyn-hark
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Sync skills from monorepo
        run: node ./scripts/sync-skills.mjs
      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
