# Deploy site/ + install.sh → GitHub Pages (hark.xk.io).
# Only on version tags (same cadence as releases) so the hosted install.sh
# matches a released tree. Manual re-deploy: workflow_dispatch.
name: Deploy site to GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (default: the tag/branch that triggered the run)"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Stage site artifact (include install.sh)
        run: |
          set -euo pipefail
          rm -rf _pages
          mkdir -p _pages
          # Marketing site
          cp -a site/. _pages/
          # Hosted one-liner: https://hark.xk.io/install.sh (version = this ref)
          cp -f install.sh _pages/install.sh
          chmod 644 _pages/install.sh
          # Do not publish local review screenshots
          rm -rf _pages/_review
          test -f _pages/index.html
          test -f _pages/install.sh
          test -f _pages/CNAME
          head -1 _pages/install.sh | grep -q '^#!'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
