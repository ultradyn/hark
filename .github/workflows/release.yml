name: Release

# Publishes @ultradyn/hark to npm and cuts a GitHub Release when a version tag
# is pushed. See RELEASE.md.
# npm Trusted Publisher OIDC must match the *actual* GitHub remote that runs
# this workflow (org/user + repo + release.yml). Until the GitHub transfer
# completes that may still be org "clankercode" repo "hark"; after transfer,
# org "ultradyn" repo "hark". Public code/docs URLs point at ultradyn (see
# docs/REPO_TRANSFER.md). (Avoid the old owner/repo slash form here so
# scripts/rewrite-github-urls.sh does not clobber this note on re-run.)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-run release for (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  contents: write # create / update the GitHub Release
  id-token: write # OIDC: npm trusted publishing (no NPM_TOKEN)

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/ultradyn-hark
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Match pi-c2c / npm trusted-publisher docs: registry-url is required so
      # npm knows the target registry; OIDC is used when id-token: write is set
      # and a Trusted Publisher is configured for this workflow.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Sync skills from monorepo
        run: node ./scripts/sync-skills.mjs

      - name: Verify tag matches package version
        working-directory: .
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            tag_name="${{ inputs.tag }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi
          tag="${tag_name#v}"
          pkg="$(node -p "require('./packages/ultradyn-hark/package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match packages/ultradyn-hark package.json version $pkg"
            exit 1
          fi
          echo "Releasing @ultradyn/hark@$pkg (tag $tag_name)"
          echo "TAG_NAME=$tag_name" >> "$GITHUB_ENV"
          echo "PKG_VERSION=$pkg" >> "$GITHUB_ENV"

      - name: Validate package contents
        run: |
          set -euo pipefail
          test -f skills/hark/SKILL.md
          test -f skills/handsfree/SKILL.md
          test -f bin/hark-skill.js
          npm pack --dry-run

      # Trusted publishing needs npm >= 11.5.1 (Node 22 ships older npm).
      - name: Upgrade npm (for OIDC trusted publishing)
        run: npm install -g npm@latest

      # Create GitHub Release first so a failed npm publish still leaves notes.
      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi
          gh release create "$tag" \
            --title "@ultradyn/hark ${PKG_VERSION}" \
            --generate-notes

      # No NODE_AUTH_TOKEN secret: OIDC trusted publishing.
      # A 404 here usually means Trusted Publisher org/repo/workflow mismatch
      # (must match the actual GitHub remote running this workflow + release.yml;
      # org may still be "clankercode" until transfer — not just docs URLs).
      - name: Publish @ultradyn/hark to npm
        run: npm publish --access public
