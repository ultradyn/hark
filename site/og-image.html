<!doctype html>
<!--
  Hark Open Graph / Twitter card source — 1200×630.
  Brand tokens from site/css/tokens.css (void / herald amber / serif display).

  Render with headless-browser-screenshots:

    node ~/.llm-general/skills/headless-browser-screenshots/scripts/screenshot.mjs \
      --url site/og-image.html \
      --out site/og.png \
      --width 1200 --height 630

  Webfonts match site tokens (Fraunces / Source Sans 3 / JetBrains Mono).
  Renderer waits for document.fonts.ready before screenshot.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@500;600&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --void: #05060a;
        --deep: #0a0c12;
        --panel: #10131c;
        --elevated: #161b28;
        --ink: #eef1f7;
        --muted: #a4adc0;
        --faint: #7a8396;
        --herald: #e8b84a;
        --herald-dim: #b8892a;
        --herald-glow: rgba(232, 184, 74, 0.35);
        --signal: #5eead4;
        --font-display: "Fraunces", Georgia, serif;
        --font-body: "Source Sans 3", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, monospace;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }
      body {
        background:
          radial-gradient(
            70% 90% at 18% 42%,
            rgba(232, 184, 74, 0.2),
            transparent 55%
          ),
          radial-gradient(
            50% 70% at 88% 80%,
            rgba(94, 234, 212, 0.08),
            transparent 50%
          ),
          linear-gradient(155deg, var(--deep) 0%, var(--void) 55%, #0d1018 100%);
        color: var(--ink);
        font-family: var(--font-body);
        position: relative;
      }
      /* faint grid */
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(238, 241, 247, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(238, 241, 247, 0.035) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      /* top herald accent */
      body::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--herald) 20%,
          var(--herald) 80%,
          transparent 100%
        );
        opacity: 0.65;
      }
      .frame {
        position: absolute;
        inset: 40px 48px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 28px;
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 28px;
      }
      .mark {
        width: 88px;
        height: 88px;
        position: relative;
        flex-shrink: 0;
      }
      .mark__ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid var(--herald);
        box-shadow:
          0 0 0 10px rgba(232, 184, 74, 0.12),
          0 0 36px var(--herald-glow);
      }
      .mark__core {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 28px;
        height: 28px;
        margin: -14px 0 0 -14px;
        border-radius: 50%;
        background: var(--herald);
        box-shadow: 0 0 20px var(--herald-glow);
      }
      .title {
        font-family: var(--font-display);
        font-size: 120px;
        font-weight: 600;
        line-height: 0.95;
        letter-spacing: -0.04em;
        background: linear-gradient(
          180deg,
          #ffffff 8%,
          #eef1f7 42%,
          var(--herald) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .mid {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 14px;
        padding-left: 4px;
        max-width: 52ch;
      }
      .tag {
        font-size: 40px;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: var(--muted);
        line-height: 1.2;
      }
      .lede {
        font-size: 26px;
        line-height: 1.4;
        color: var(--faint);
        max-width: 38ch;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        border-top: 1px solid rgba(232, 184, 74, 0.28);
        padding-top: 22px;
      }
      .pills {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .pill {
        font-family: var(--font-mono);
        font-size: 18px;
        font-weight: 500;
        color: var(--ink);
        border: 1px solid rgba(238, 241, 247, 0.1);
        background: rgba(16, 19, 28, 0.75);
        border-radius: 999px;
        padding: 10px 18px;
      }
      .pill--signal {
        border-color: rgba(94, 234, 212, 0.28);
        color: var(--signal);
      }
      .site {
        font-family: var(--font-mono);
        font-size: 26px;
        font-weight: 600;
        color: var(--herald);
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="brand-row">
        <div class="mark" aria-hidden="true">
          <div class="mark__ring"></div>
          <div class="mark__core"></div>
        </div>
        <h1 class="title">Hark</h1>
      </div>
      <div class="mid">
        <p class="tag">When your agents need a word.</p>
        <p class="lede">
          Handsfree voice for your coding-agent fleet in Herdr.
        </p>
      </div>
      <div class="footer">
        <div class="pills">
          <span class="pill">skill-first</span>
          <span class="pill">fleet</span>
          <span class="pill pill--signal">voice</span>
        </div>
        <div class="site">hark.xk.io</div>
      </div>
    </div>
  </body>
</html>
