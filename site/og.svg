<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Hark — handsfree voice for your agent herd">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="55%" stop-color="#0a0c12"/>
      <stop offset="100%" stop-color="#10131c"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="10%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#eef1f7"/>
      <stop offset="100%" stop-color="#e8b84a"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#e8b84a" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#e8b84a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e8b84a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(238,241,247,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle top edge accent -->
  <rect x="0" y="0" width="1200" height="3" fill="#e8b84a" opacity="0.55"/>

  <!-- brand mark: herald ring -->
  <g transform="translate(96, 168)">
    <circle cx="48" cy="48" r="46" fill="none" stroke="#e8b84a" stroke-width="4"/>
    <circle cx="48" cy="48" r="46" fill="none" stroke="rgba(232,184,74,0.18)" stroke-width="14"/>
    <circle cx="48" cy="48" r="18" fill="#e8b84a"/>
  </g>

  <text x="220" y="250" font-family="Georgia, 'Iowan Old Style', 'Palatino Linotype', serif" font-size="128" font-weight="600" fill="url(#titleGrad)" letter-spacing="-4">Hark</text>

  <text x="96" y="340" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="40" fill="#a4adc0" letter-spacing="0.5">When your agents need a word.</text>

  <text x="96" y="410" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" fill="#7a8396">Handsfree voice for your coding-agent fleet in Herdr</text>

  <!-- bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(16,19,28,0.85)"/>
  <rect x="0" y="540" width="1200" height="1" fill="rgba(232,184,74,0.35)"/>
  <text x="96" y="595" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, monospace" font-size="26" fill="#e8b84a">hark.xk.io</text>
  <text x="780" y="595" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#7a8396" text-anchor="end">skill-first · fleet · voice</text>
</svg>
